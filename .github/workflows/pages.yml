name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site content
        run: |
          mkdir -p _site
          cp -r site/. _site/
          # Copy the DOCX templates into the site so download links resolve
          mkdir -p _site/templates
          cp -r templates/. _site/templates/
          # Prevent Jekyll processing (files with _ prefix, etc.)
          touch _site/.nojekyll
          ls -la _site
          echo "---"
          echo "Templates in site build:"
          ls _site/templates | head -30

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
